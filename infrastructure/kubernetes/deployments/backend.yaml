apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-ingestion
  namespace: argus
  labels:
    app: argus-ingestion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: argus-ingestion
  template:
    metadata:
      labels:
        app: argus-ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ingestion-api
        image: argus/ingestion:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: argus-config
        - secretRef:
            name: argus-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: argus-ingestion-svc
  namespace: argus
spec:
  selector:
    app: argus-ingestion
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argus-ingestion-hpa
  namespace: argus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argus-ingestion
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
